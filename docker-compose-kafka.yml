version: "3"
networks:
  ets-network:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"

services:
  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    container_name: zookeeper
    networks:
      - ets-network

  kafka-broker:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: localhost
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "weather-api:1:1,weather-rss:1:1"
    container_name: kafka-broker
    depends_on:
      - zookeeper
    networks:
      - ets-network
